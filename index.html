<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Will You Be Mine, Shorna?</title>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ice:    #e8f4ff;
  --frost:  #c2dff7;
  --crystal:#a8d4f5;
  --deep:   #0a0f1e;
  --midnight:#080c18;
  --glow:   #7ec8f7;
  --rose:   #f7a8c4;
  --roseD:  #e8436b;
  --gold:   #d4e8ff;
  --white:  #ffffff;
}

html { scroll-behavior: smooth; }

body {
  background: var(--midnight);
  font-family: 'Cormorant', serif;
  overflow-x: hidden;
  cursor: none;
}

/* ---- CURSOR ---- */
#cur {
  width: 10px; height: 10px;
  background: var(--glow);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 12px var(--glow), 0 0 30px rgba(126,200,247,0.4);
  transition: width .2s, height .2s;
}
#cur-ring {
  width: 32px; height: 32px;
  border: 1px solid rgba(168,212,245,0.5);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%,-50%);
  transition: left .1s ease, top .1s ease;
}

/* ---- CANVAS BG ---- */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ---- INTRO ---- */
#intro {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--midnight);
  transition: opacity 1.4s ease, transform 1.4s ease;
}
#intro.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

.crystal-orb {
  width: 160px; height: 160px;
  position: relative;
  margin-bottom: 2.5rem;
  animation: orbFloat 4s ease-in-out infinite;
}
@keyframes orbFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-16px); }
}

.orb-inner {
  width: 100%; height: 100%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%,
    rgba(255,255,255,0.9) 0%,
    rgba(200,230,255,0.6) 25%,
    rgba(126,200,247,0.3) 55%,
    rgba(10,15,30,0.8) 100%
  );
  box-shadow:
    0 0 40px rgba(126,200,247,0.3),
    0 0 80px rgba(126,200,247,0.15),
    inset 0 0 30px rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.orb-inner::before {
  content: '';
  position: absolute;
  top: 12%; left: 20%;
  width: 30%; height: 18%;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
  filter: blur(6px);
  transform: rotate(-30deg);
}
.orb-inner::after {
  content: '';
  position: absolute;
  top: 55%; left: 55%;
  width: 12%; height: 8%;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  filter: blur(3px);
}
.orb-heart {
  font-size: 3.5rem;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 10px rgba(247,168,196,0.8));
  animation: heartbeat 1.6s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  15%     { transform: scale(1.18); }
  30%     { transform: scale(1); }
  45%     { transform: scale(1.1); }
  60%     { transform: scale(1); }
}

.orb-ring {
  position: absolute; inset: -14px;
  border-radius: 50%;
  border: 1px solid rgba(168,212,245,0.25);
  animation: ringPulse 3s ease-in-out infinite;
}
.orb-ring2 {
  position: absolute; inset: -30px;
  border-radius: 50%;
  border: 1px solid rgba(168,212,245,0.12);
  animation: ringPulse 3s ease-in-out infinite .6s;
}
.orb-ring3 {
  position: absolute; inset: -50px;
  border-radius: 50%;
  border: 1px solid rgba(168,212,245,0.06);
  animation: ringPulse 3s ease-in-out infinite 1.2s;
}
@keyframes ringPulse {
  0%,100% { transform: scale(1); opacity: 1; }
  50%     { transform: scale(1.04); opacity: 0.4; }
}

.intro-label {
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(168,212,245,0.5);
  font-size: .8rem;
  letter-spacing: .55em;
  text-transform: uppercase;
  margin-bottom: .6rem;
  animation: fadeUp 1.5s ease both .4s;
}
.intro-name {
  font-family: 'Great Vibes', cursive;
  font-size: 4rem;
  color: var(--ice);
  text-shadow: 0 0 40px rgba(168,212,245,0.6), 0 0 80px rgba(126,200,247,0.3);
  animation: fadeUp 1.5s ease both .8s;
  margin-bottom: 2.5rem;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

.open-btn {
  padding: .9rem 3rem;
  background: transparent;
  border: 1px solid rgba(168,212,245,0.4);
  color: var(--ice);
  font-family: 'Tenor Sans', sans-serif;
  font-size: .8rem;
  letter-spacing: .4em;
  text-transform: uppercase;
  cursor: none;
  position: relative;
  overflow: hidden;
  transition: box-shadow .3s, color .3s;
  animation: fadeUp 1.5s ease both 1.2s;
  backdrop-filter: blur(10px);
}
.open-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(168,212,245,0.15), rgba(255,255,255,0.05));
  transform: translateX(-100%);
  transition: transform .4s ease;
}
.open-btn:hover::before { transform: translateX(0); }
.open-btn:hover {
  box-shadow: 0 0 30px rgba(126,200,247,0.4), inset 0 0 20px rgba(168,212,245,0.1);
  color: white;
}

/* ---- MAIN ---- */
#main { opacity: 0; transition: opacity 1.5s ease .3s; position: relative; z-index: 1; }
#main.show { opacity: 1; }

/* ---- HERO ---- */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  padding: 4rem 2rem;
  text-align: center;
  overflow: hidden;
}

.hero-prism {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(ellipse,
    rgba(126,200,247,0.06) 0%,
    rgba(168,212,245,0.03) 40%,
    transparent 70%
  );
  pointer-events: none;
  animation: prismRotate 20s linear infinite;
}
@keyframes prismRotate {
  from { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.1); }
  to   { transform: rotate(360deg) scale(1); }
}

.hero-tagline {
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(168,212,245,0.5);
  font-size: .85rem;
  letter-spacing: .5em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  animation: fadeUp 1s ease both .2s;
}

.hero-h1 {
  font-family: 'Cormorant', serif;
  font-weight: 300;
  font-size: clamp(2.8rem, 9vw, 6.5rem);
  color: var(--ice);
  line-height: 1.1;
  animation: fadeUp 1s ease both .5s;
}
.hero-h1 em {
  font-style: italic;
  background: linear-gradient(135deg, var(--ice), var(--glow), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}
.hero-name {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(4rem, 14vw, 10rem);
  background: linear-gradient(135deg, #ffffff 0%, var(--crystal) 40%, var(--glow) 70%, var(--rose) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  line-height: 1;
  filter: drop-shadow(0 0 30px rgba(126,200,247,0.3));
  animation: fadeUp 1s ease both .8s;
}

.crystal-divider {
  display: flex; align-items: center; gap: 1.2rem;
  margin: 2rem auto;
  animation: fadeUp 1s ease both 1s;
}
.crystal-divider::before, .crystal-divider::after {
  content: '';
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(168,212,245,0.5), transparent);
}
.crystal-gem {
  width: 10px; height: 10px;
  background: var(--glow);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  box-shadow: 0 0 10px var(--glow);
  animation: gemSpin 4s linear infinite;
}
@keyframes gemSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.hero-sub {
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(194,223,247,0.65);
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  max-width: 460px;
  line-height: 1.9;
  animation: fadeUp 1s ease both 1.2s;
}

.scroll-indicator {
  position: absolute; bottom: 2.5rem;
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  color: rgba(168,212,245,0.3);
  font-size: .65rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  animation: fadeUp 1s ease both 1.8s;
  font-family: 'Tenor Sans', sans-serif;
}
.scroll-line {
  width: 1px; height: 44px;
  background: linear-gradient(to bottom, transparent, rgba(126,200,247,0.6));
  animation: scrollAnim 1.8s ease-in-out infinite;
}
@keyframes scrollAnim {
  0%,100% { transform: scaleY(1); opacity: .4; }
  50%     { transform: scaleY(.5); opacity: 1; }
}

/* ---- FACETS (reasons) ---- */
#facets {
  padding: 8rem 2rem;
  position: relative;
  background: linear-gradient(180deg, var(--midnight) 0%, #0d1525 50%, var(--midnight) 100%);
}

.sec-label {
  text-align: center;
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(126,200,247,0.6);
  font-size: .8rem;
  letter-spacing: .55em;
  text-transform: uppercase;
  margin-bottom: .6rem;
}
.sec-title {
  font-family: 'Cormorant', serif;
  font-weight: 300;
  font-size: clamp(2rem, 5vw, 3.5rem);
  color: var(--ice);
  text-align: center;
  margin-bottom: 4.5rem;
}
.sec-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--glow), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.facets-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
  max-width: 1100px;
  margin: 0 auto;
}

.facet {
  position: relative;
  padding: 2.5rem 2rem;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.06) 0%,
    rgba(168,212,245,0.04) 50%,
    rgba(255,255,255,0.02) 100%
  );
  border: 1px solid rgba(168,212,245,0.12);
  backdrop-filter: blur(20px);
  overflow: hidden;
  transition: transform .3s, box-shadow .3s, border-color .3s;
}
.facet::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(168,212,245,0.6), transparent);
  transform: scaleX(0);
  transition: transform .5s ease;
}
.facet::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 60%; height: 60%;
  background: radial-gradient(circle, rgba(126,200,247,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
  transition: transform .4s ease;
}
.facet:hover::before { transform: scaleX(1); }
.facet:hover::after  { transform: translate(80%, 80%); }
.facet:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 60px rgba(126,200,247,0.1), 0 0 0 1px rgba(168,212,245,0.2);
  border-color: rgba(168,212,245,0.25);
}

.facet-num {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 3.5rem;
  color: rgba(126,200,247,0.12);
  line-height: 1;
  margin-bottom: .4rem;
}
.facet-icon {
  font-size: 1.6rem;
  margin-bottom: .8rem;
  display: block;
  filter: drop-shadow(0 0 6px rgba(126,200,247,0.4));
}
.facet-title {
  font-family: 'Tenor Sans', sans-serif;
  font-size: 1rem;
  color: var(--ice);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: .7rem;
}
.facet-text {
  font-family: 'Cormorant', serif;
  font-size: 1.1rem;
  color: rgba(194,223,247,0.65);
  line-height: 1.8;
  font-style: italic;
}

/* ---- LETTER ---- */
#letter {
  padding: 8rem 2rem;
  background: var(--midnight);
  position: relative;
  overflow: hidden;
}
#letter::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, rgba(126,200,247,0.04) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.letter-wrap {
  max-width: 680px;
  margin: 0 auto;
  position: relative;
}

.letter-crystal-top {
  display: flex; justify-content: center; margin-bottom: 2.5rem;
  gap: .6rem; align-items: center;
}
.gem-sm {
  width: 8px; height: 8px;
  background: var(--glow);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  box-shadow: 0 0 8px var(--glow);
}
.gem-lg {
  width: 14px; height: 14px;
  background: linear-gradient(135deg, var(--ice), var(--glow));
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  box-shadow: 0 0 14px rgba(126,200,247,0.8);
  animation: gemPulse 2s ease-in-out infinite;
}
@keyframes gemPulse {
  0%,100% { box-shadow: 0 0 14px rgba(126,200,247,0.8); }
  50%     { box-shadow: 0 0 28px rgba(126,200,247,1), 0 0 50px rgba(126,200,247,0.4); }
}

.letter-card {
  background: linear-gradient(145deg,
    rgba(255,255,255,0.07) 0%,
    rgba(168,212,245,0.05) 40%,
    rgba(255,255,255,0.03) 100%
  );
  border: 1px solid rgba(168,212,245,0.15);
  padding: 4rem 3.5rem;
  position: relative;
  backdrop-filter: blur(30px);
}
.letter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), rgba(168,212,245,0.6), rgba(255,255,255,0.4), transparent);
}
.letter-card::after {
  content: '';
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1px solid rgba(168,212,245,0.06);
  pointer-events: none;
}

/* Corner crystals */
.letter-card .corner {
  position: absolute;
  width: 20px; height: 20px;
}
.corner.tl { top: -1px; left: -1px; border-top: 2px solid rgba(168,212,245,0.5); border-left: 2px solid rgba(168,212,245,0.5); }
.corner.tr { top: -1px; right: -1px; border-top: 2px solid rgba(168,212,245,0.5); border-right: 2px solid rgba(168,212,245,0.5); }
.corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid rgba(168,212,245,0.5); border-left: 2px solid rgba(168,212,245,0.5); }
.corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid rgba(168,212,245,0.5); border-right: 2px solid rgba(168,212,245,0.5); }

.letter-date {
  font-family: 'Tenor Sans', sans-serif;
  font-size: .7rem;
  letter-spacing: .35em;
  color: rgba(126,200,247,0.5);
  text-transform: uppercase;
  margin-bottom: 2rem;
}
.letter-greeting {
  font-family: 'Great Vibes', cursive;
  font-size: 2.4rem;
  color: var(--ice);
  margin-bottom: 1.5rem;
  text-shadow: 0 0 20px rgba(168,212,245,0.3);
}
.letter-body {
  font-family: 'Cormorant', serif;
  font-style: italic;
  font-size: 1.15rem;
  color: rgba(194,223,247,0.8);
  line-height: 2.1;
}
.letter-body p { margin-bottom: 1.3rem; }
.letter-body strong {
  font-style: normal;
  font-weight: 400;
  color: var(--ice);
  border-bottom: 1px solid rgba(126,200,247,0.3);
}
.letter-sign {
  margin-top: 2.5rem;
  text-align: right;
  font-family: 'Great Vibes', cursive;
  font-size: 2.2rem;
  color: var(--glow);
  text-shadow: 0 0 20px rgba(126,200,247,0.5);
}
.letter-sign small {
  display: block;
  font-family: 'Tenor Sans', sans-serif;
  font-size: .65rem;
  letter-spacing: .3em;
  color: rgba(126,200,247,0.4);
  text-transform: uppercase;
  margin-top: .4rem;
  font-style: normal;
}

/* ---- QUESTION ---- */
#question {
  padding: 9rem 2rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, var(--midnight) 0%, #0a1020 100%);
}

.q-bg {
  position: absolute;
  font-family: 'Cormorant', serif;
  font-size: clamp(6rem, 22vw, 18rem);
  font-style: italic;
  font-weight: 600;
  color: rgba(126,200,247,0.03);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
  pointer-events: none;
  letter-spacing: -.02em;
}

.q-title {
  font-family: 'Cormorant', serif;
  font-weight: 300;
  font-size: clamp(2.5rem, 7vw, 5rem);
  color: var(--ice);
  line-height: 1.15;
  margin-bottom: 1rem;
}
.q-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--glow), var(--rose));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.q-name {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(3.5rem, 11vw, 8rem);
  background: linear-gradient(135deg, #fff 0%, var(--crystal) 40%, var(--glow) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
  filter: drop-shadow(0 0 20px rgba(126,200,247,0.3));
  line-height: 1.1;
}
.q-sub {
  font-family: 'Cormorant', serif;
  font-style: italic;
  color: rgba(168,212,245,0.45);
  font-size: 1.1rem;
  margin: 1.5rem 0 3.5rem;
}

.btns { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }

.btn-yes {
  padding: 1.1rem 3.5rem;
  background: linear-gradient(135deg, rgba(126,200,247,0.2), rgba(168,212,245,0.1));
  border: 1px solid rgba(168,212,245,0.5);
  color: var(--ice);
  font-family: 'Tenor Sans', sans-serif;
  font-size: .9rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  cursor: none;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(20px);
  transition: transform .3s, box-shadow .3s;
}
.btn-yes::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(247,168,196,0.3), rgba(126,200,247,0.2));
  transform: translateX(-100%);
  transition: transform .4s;
}
.btn-yes:hover::before { transform: translateX(0); }
.btn-yes:hover {
  transform: scale(1.06);
  box-shadow: 0 0 40px rgba(126,200,247,0.4), 0 0 80px rgba(126,200,247,0.15);
}

.btn-no {
  padding: 1.1rem 3.5rem;
  background: transparent;
  border: 1px solid rgba(168,212,245,0.15);
  color: rgba(168,212,245,0.3);
  font-family: 'Tenor Sans', sans-serif;
  font-size: .9rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  cursor: none;
  transition: all .3s;
  position: relative;
}

/* ---- YES OVERLAY ---- */
#yes-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #050a14, #0a1528, #050a14);
  z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
  opacity: 0; pointer-events: none;
  transition: opacity .8s ease;
}
#yes-overlay.show { opacity: 1; pointer-events: all; }

#confetti-c {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 201;
}

.yes-orb {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%,
    rgba(255,255,255,0.9),
    rgba(247,168,196,0.5) 40%,
    rgba(126,200,247,0.3) 70%,
    transparent
  );
  box-shadow: 0 0 60px rgba(247,168,196,0.4), 0 0 120px rgba(126,200,247,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  margin: 0 auto 1.5rem;
  animation: popIn .6s ease both .3s, orbFloat 3s ease-in-out infinite 1s;
}
.yes-title {
