<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Will You Be Mine, Shorna?</title>
<style>
/* ============================================================
   ZERO EXTERNAL DEPENDENCIES \u2014 works offline, any browser
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ice:     #e8f4ff;
  --frost:   #c2dff7;
  --crystal: #a8d4f5;
  --glow:    #7ec8f7;
  --rose:    #f7a8c4;
  --roseD:   #e8436b;
  --mid:     #080c18;
  --deep:    #050810;
  --gold:    rgba(212,232,255,0.9);

  /* Safe system font stacks */
  --font-serif:   Georgia, "Times New Roman", Times, serif;
  --font-script:  "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
  --font-sans:    "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--deep);
  font-family: var(--font-serif);
  overflow-x: hidden;
  color: var(--ice);
  cursor: default;
}

/* ---- BG CANVAS ---- */
#bg-canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* ============================================================
   INTRO SCREEN
   ============================================================ */
#intro {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--deep);
  transition: opacity 1.4s ease, transform 1.4s ease;
  text-align: center; padding: 2rem;
}
#intro.hide { opacity:0; transform:scale(1.05); pointer-events:none; }

/* Crystal orb */
.orb-wrap {
  width: 160px; height: 160px;
  position: relative; margin-bottom: 2.5rem;
  animation: floatOrb 4s ease-in-out infinite;
}
@keyframes floatOrb {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-14px); }
}
.orb-body {
  width: 100%; height: 100%; border-radius: 50%;
  background:
    radial-gradient(circle at 32% 28%,
      rgba(255,255,255,0.95) 0%,
      rgba(200,228,255,0.65) 18%,
      rgba(126,200,247,0.35) 45%,
      rgba(8,12,24,0.85) 100%);
  box-shadow:
    0 0 50px rgba(126,200,247,0.35),
    0 0 100px rgba(126,200,247,0.15),
    inset 0 0 25px rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
/* Specular highlights */
.orb-body::before {
  content: '';
  position: absolute; top:10%; left:18%;
  width:32%; height:18%;
  background: rgba(255,255,255,0.75);
  border-radius: 50%; filter: blur(5px);
  transform: rotate(-25deg);
}
.orb-body::after {
  content: '';
  position: absolute; top:58%; left:58%;
  width:12%; height:7%;
  background: rgba(255,255,255,0.4);
  border-radius: 50%; filter: blur(3px);
}
.orb-heart {
  font-size: 3.2rem; position: relative; z-index:2;
  filter: drop-shadow(0 0 12px rgba(247,168,196,0.9));
  animation: beat 1.6s ease-in-out infinite;
}
@keyframes beat {
  0%,100% { transform:scale(1); }
  14%     { transform:scale(1.2); }
  28%     { transform:scale(1); }
  42%     { transform:scale(1.12); }
  56%     { transform:scale(1); }
}
/* Rings */
.orb-r1,.orb-r2,.orb-r3 {
  position:absolute; border-radius:50%; top:50%; left:50%;
  transform:translate(-50%,-50%);
  border:1px solid rgba(168,212,245,0.22);
}
.orb-r1 { width:190px; height:190px; animation:pulse 3s ease-in-out infinite; }
.orb-r2 { width:224px; height:224px; animation:pulse 3s ease-in-out infinite .5s; border-color:rgba(168,212,245,0.12); }
.orb-r3 { width:264px; height:264px; animation:pulse 3s ease-in-out infinite 1s; border-color:rgba(168,212,245,0.06); }
@keyframes pulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
  50%     { transform:translate(-50%,-50%) scale(1.05); opacity:0.4; }
}

.intro-eyebrow {
  font-family: var(--font-sans);
  font-size: 0.7rem; letter-spacing: 0.55em;
  text-transform: uppercase;
  color: rgba(168,212,245,0.5);
  margin-bottom: 0.6rem;
  animation: up 1.4s ease both 0.4s;
}
.intro-name {
  font-family: var(--font-script);
  font-size: clamp(3rem,12vw,4.5rem);
  font-style: italic; font-weight: 400;
  color: var(--ice);
  text-shadow: 0 0 40px rgba(168,212,245,0.6), 0 0 80px rgba(126,200,247,0.3);
  margin-bottom: 2.5rem;
  animation: up 1.4s ease both 0.8s;
}
.open-btn {
  padding: 0.9rem 2.8rem;
  background: rgba(126,200,247,0.08);
  border: 1px solid rgba(168,212,245,0.4);
  color: var(--ice);
  font-family: var(--font-sans);
  font-size: 0.78rem; letter-spacing: 0.4em;
  text-transform: uppercase;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: box-shadow 0.3s, background 0.3s;
  animation: up 1.4s ease both 1.2s;
  -webkit-tap-highlight-color: transparent;
}
.open-btn:hover, .open-btn:active {
  background: rgba(126,200,247,0.18);
  box-shadow: 0 0 30px rgba(126,200,247,0.35), inset 0 0 20px rgba(168,212,245,0.08);
}

@keyframes up {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ============================================================
   MAIN
   ============================================================ */
#main { opacity:0; transition:opacity 1.5s ease 0.3s; position:relative; z-index:1; }
#main.show { opacity:1; }

/* ============================================================
   HERO
   ============================================================ */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 5rem 2rem 6rem;
  text-align: center; position: relative; overflow: hidden;
}
.hero-glow {
  position: absolute; border-radius:50%;
  pointer-events:none;
  background: radial-gradient(ellipse, rgba(126,200,247,0.07) 0%, transparent 70%);
  width: 700px; height: 700px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  animation: glowPulse 6s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
  50%     { transform:translate(-50%,-50%) scale(1.15); opacity:0.5; }
}
.hero-eye {
  font-family: var(--font-sans);
  font-size: 0.72rem; letter-spacing: 0.55em;
  text-transform: uppercase;
  color: rgba(168,212,245,0.5);
  margin-bottom: 1.5rem;
  animation: up 1s ease both 0.2s;
}
.hero-will {
  font-family: var(--font-serif);
  font-style: italic; font-weight: 400;
  font-size: clamp(2rem, 7vw, 4.5rem);
  color: rgba(232,244,255,0.9);
  animation: up 1s ease both 0.5s;
  line-height: 1.2;
}
.hero-mine {
  font-family: var(--font-script);
  font-style: italic;
  font-size: clamp(4.5rem, 18vw, 10rem);
  color: transparent;
  background: linear-gradient(135deg, #ffffff 0%, var(--crystal) 35%, var(--glow) 65%, var(--rose) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block;
  line-height: 1.05;
  filter: drop-shadow(0 0 30px rgba(126,200,247,0.25));
  animation: up 1s ease both 0.8s;
}
/* Fallback for browsers that don't support background-clip:text */
@supports not (-webkit-background-clip: text) {
  .hero-mine { color: var(--glow); background: none; -webkit-text-fill-color: unset; filter: none; }
}

.divider {
  display:flex; align-items:center; gap:1rem;
  margin: 1.8rem 0; animation: up 1s ease both 1s;
}
.divider::before, .divider::after {
  content:''; flex:1; max-width:80px; height:1px;
  background: linear-gradient(90deg,transparent,rgba(168,212,245,0.45),transparent);
}
.gem {
  width:10px; height:10px;
  background: var(--glow);
  clip-path: polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  box-shadow: 0 0 10px var(--glow);
  animation: spin 5s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.hero-sub {
  font-family: var(--font-serif);
  font-style: italic; font-size: clamp(1rem,2.8vw,1.25rem);
  color: rgba(194,223,247,0.6);
  max-width: 440px; line-height: 1.95;
  animation: up 1s ease both 1.2s;
}
.scroll-wrap {
  position:absolute; bottom:2.2rem;
  display:flex; flex-direction:column; align-items:center; gap:0.4rem;
  animation: up 1s ease both 1.8s;
}
.scroll-txt {
  font-family: var(--font-sans);
  font-size:0.6rem; letter-spacing:0.4em;
  text-transform:uppercase; color:rgba(168,212,245,0.28);
}
.scroll-line {
  width:1px; height:42px;
  background: linear-gradient(to bottom,transparent,rgba(126,200,247,0.55));
  animation: linePulse 2s ease-in-out infinite;
}
@keyframes linePulse {
  0%,100% { transform:scaleY(1); opacity:0.35; }
  50%     { transform:scaleY(0.5); opacity:1; }
}

/* ============================================================
   FACETS / REASONS
   ============================================================ */
#facets {
  padding: 7rem 2rem;
  background: linear-gradient(180deg, var(--deep) 0%, #0d1525 50%, var(--deep) 100%);
  position:relative;
}
.sec-eye {
  text-align:center;
  font-family:var(--font-sans);
  font-size:0.7rem; letter-spacing:0.55em;
  text-transform:uppercase; color:rgba(126,200,247,0.55);
  margin-bottom:0.6rem;
}
.sec-head {
  font-family:var(--font-serif);
  font-weight:400; font-style:italic;
  font-size:clamp(1.8rem,5vw,3.2rem);
  color:var(--ice); text-align:center;
  margin-bottom:4rem; line-height:1.2;
}
.sec-head em {
  font-style:normal;
  color: transparent;
  background: linear-gradient(135deg,var(--glow),var(--rose));
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
}
@supports not (-webkit-background-clip: text) {
  .sec-head em { color: var(--rose); background:none; -webkit-text-fill-color:unset; }
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
  gap:1.4rem; max-width:1080px; margin:0 auto;
}
.card {
  padding:2.4rem 1.8rem;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.055) 0%,
    rgba(168,212,245,0.03) 50%,
    rgba(255,255,255,0.02) 100%);
  border:1px solid rgba(168,212,245,0.12);
  position:relative; overflow:hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(168,212,245,0.6),transparent);
  transform:scaleX(0); transition:transform 0.5s ease;
}
.card:hover::before { transform:scaleX(1); }
.card:hover {
  transform:translateY(-7px);
  box-shadow:0 18px 55px rgba(126,200,247,0.1), 0 0 0 1px rgba(168,212,245,0.2);
  border-color:rgba(168,212,245,0.22);
}
/* Corner accents */
.card .ca { position:absolute; width:16px; height:16px; }
.ca.tl { top:-1px;left:-1px; border-top:2px solid rgba(168,212,245,0.5); border-left:2px solid rgba(168,212,245,0.5); }
.ca.tr { top:-1px;right:-1px; border-top:2px solid rgba(168,212,245,0.5); border-right:2px solid rgba(168,212,245,0.5); }

.card-n {
  font-family:var(--font-serif);
  font-size:3rem; font-style:italic;
  color:rgba(126,200,247,0.1); line-height:1; margin-bottom:0.3rem;
}
.card-icon { font-size:1.5rem; display:block; margin-bottom:0.7rem; filter:drop-shadow(0 0 6px rgba(126,200,247,0.4)); }
.card-title {
  font-family:var(--font-sans);
  font-size:0.78rem; letter-spacing:0.15em;
  text-transform:uppercase; color:var(--ice);
  margin-bottom:0.65rem;
}
.card-text {
  font-family:var(--font-serif);
  font-style:italic; font-size:1.05rem;
  color:rgba(194,223,247,0.62); line-height:1.85;
}

/* ============================================================
   LETTER
   ============================================================ */
#letter {
  padding: 7rem 2rem;
  background: var(--deep);
  position:relative; overflow:hidden;
}
#letter::before {
  content:'';
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:700px; height:700px;
  background:radial-gradient(circle,rgba(126,200,247,0.04) 0%,transparent 70%);
  border-radius:50%; pointer-events:none;
}
.letter-outer { max-width:660px; margin:0 auto; }

.gem-row { display:flex; justify-content:center; align-items:center; gap:0.6rem; margin-bottom:2.5rem; }
.g-sm { width:7px;height:7px; background:var(--glow); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); box-shadow:0 0 7px var(--glow); }
.g-lg { width:13px;height:13px; background:linear-gradient(135deg,var(--ice),var(--glow)); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); box-shadow:0 0 14px rgba(126,200,247,0.9); animation:gemGlow 2s ease-in-out infinite; }
@keyframes gemGlow {
  0%,100% { box-shadow:0 0 14px rgba(126,200,247,0.8); }
  50%     { box-shadow:0 0 28px rgba(126,200,247,1),0 0 50px rgba(126,200,247,0.4); }
}

.letter-box {
  background:linear-gradient(145deg,rgba(255,255,255,0.065) 0%,rgba(168,212,245,0.04) 40%,rgba(255,255,255,0.025) 100%);
  border:1px solid rgba(168,212,245,0.14);
  padding:3.5rem 3rem;
  position:relative;
}
/* Top shimmer line */
.letter-box::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),rgba(168,212,245,0.65),rgba(255,255,255,0.4),transparent);
}
/* Inner border */
.letter-box::after {
  content:'';
  position:absolute; inset:8px;
  border:1px solid rgba(168,212,245,0.055);
  pointer-events:none;
}
.lc { position:absolute; width:18px; height:18px; }
.lc.tl{top:-1px;left:-1px;border-top:2px solid rgba(168,212,245,0.5);border-left:2px solid rgba(168,212,245,0.5);}
.lc.tr{top:-1px;right:-1px;border-top:2px solid rgba(168,212,245,0.5);border-right:2px solid rgba(168,212,245,0.5);}
.lc.bl{bottom:-1px;left:-1px;border-bottom:2px solid rgba(168,212,245,0.5);border-left:2px solid rgba(168,212,245,0.5);}
.lc.br{bottom:-1px;right:-1px;border-bottom:2px solid rgba(168,212,245,0.5);border-right:2px solid rgba(168,212,245,0.5);}

.l-date {
  font-family:var(--font-sans);
  font-size:0.65rem; letter-spacing:0.35em;
  text-transform:uppercase; color:rgba(126,200,247,0.5);
  margin-bottom:2rem;
}
.l-greet {
  font-family:var(--font-script);
  font-style:italic; font-size:2
